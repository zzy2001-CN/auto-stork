name: Stork Daily Digest

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Stork collector
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_AUTH_CODE: ${{ secrets.MAIL_AUTH_CODE }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.MAIL_USERNAME }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python -m stork_mailer.cli

      - name: Commit report
        run: |
          if [ -z "$(git status --porcelain docs/stork)" ]; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/stork
          git commit -m "Add Stork daily report"
          git push

